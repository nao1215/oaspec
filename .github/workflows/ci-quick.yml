name: Quick

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Format / typecheck / lint / sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"

      - name: Cache Gleam deps
        uses: actions/cache@v4
        with:
          path: |
            build/packages
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-deps-${{ hashFiles('manifest.toml', 'gleam.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-deps-

      - name: Download dependencies
        run: gleam deps download

      - name: Format check
        run: gleam format --check src/ test/

      - name: Type check
        run: gleam check

      - name: Lint (glinter, strict)
        run: gleam run -m glinter -- --stats

      - name: Check version and count sync
        run: bash scripts/check_sync.sh
