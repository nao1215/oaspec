name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Build / unit / shellspec / integration / escript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"

      - name: Install rebar3
        run: |
          wget -q https://s3.amazonaws.com/rebar3/rebar3 -O /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Install ShellSpec
        run: |
          curl -fsSL https://git.io/shellspec | sh -s -- --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Gleam build
        uses: actions/cache@v4
        with:
          path: |
            build/packages
            build/dev/erlang/oaspec
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml') }}-
            ${{ runner.os }}-gleam-build-

      - name: Download dependencies
        run: gleam deps download

      - name: Build (warnings as errors)
        run: gleam build --warnings-as-errors

      - name: Unit tests
        run: gleam test

      - name: ShellSpec tests
        run: shellspec

      - name: Integration tests
        run: bash integration_test/run.sh

      - name: Build escript
        run: gleam run -m gleescript

      - name: Smoke-test built escript
        run: bash scripts/smoke_escript.sh ./oaspec

      - name: README library examples compile check
        run: bash scripts/check_readme_examples.sh
