name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Build / unit / shellspec / integration / escript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
          rebar3-version: "3"

      - name: Install ShellSpec
        run: |
          curl -fsSL https://git.io/shellspec | sh -s -- --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Gleam build
        uses: actions/cache@v5
        with:
          path: |
            build/packages
            build/dev/erlang/oaspec
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml') }}-
            ${{ runner.os }}-gleam-build-

      - name: Download dependencies
        run: gleam deps download

      - name: Build (warnings as errors)
        run: gleam build --warnings-as-errors

      - name: Unit tests
        run: gleam test

      - name: ShellSpec tests
        run: shellspec

      - name: Integration tests
        run: bash integration_test/run.sh

      - name: Build escript
        run: gleam run -m gleescript

      - name: Smoke-test built escript
        run: bash scripts/smoke_escript.sh ./oaspec

      - name: README library examples compile check
        run: bash scripts/check_readme_examples.sh

  github-openapi:
    # Generates the full GitHub OpenAPI document end-to-end and runs
    # format and build against the produced package. Heavy
    # (~3-4 min wall) and self-contained, so it lives in its own job
    # and runs in parallel with the main test job. Glinter is
    # intentionally omitted — its quadratic-in-module-size analysis
    # on the 30k+-line generated decode/encode/guard modules adds
    # multi-minute wall time without unique signal; the project's own
    # lint step already covers every rule it would surface.
    name: Full GitHub OpenAPI generate / format / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
          rebar3-version: "3"

      - name: Cache Gleam build
        uses: actions/cache@v5
        with:
          path: |
            build/packages
            build/dev/erlang/oaspec
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml') }}-
            ${{ runner.os }}-gleam-build-

      - name: Cache GitHub OpenAPI document
        uses: actions/cache@v5
        with:
          path: /tmp/oaspec_github_api.yaml
          key: github-openapi-yaml-${{ github.run_id }}
          restore-keys: github-openapi-yaml-

      - name: Download dependencies
        run: gleam deps download

      - name: Build oaspec (warnings as errors)
        run: gleam build --warnings-as-errors

      - name: Generate / format / build full GitHub OpenAPI
        run: bash integration_test/github_full.sh

  stripe-openapi:
    # Companion to github-openapi: runs the full Stripe OpenAPI spec
    # (committed in-repo at doc/reference/oss/libopenapi/test_specs/
    # stripe.yaml, ~4.3 MB / ~1k operations) end-to-end. Stripe leans
    # heavily on form-urlencoded bodies, deepObject query parameters,
    # composite (oneOf / anyOf / allOf) field shapes, and inline
    # enums nested several levels deep — exactly the codegen surface
    # PRs #540–#543 added. The job builds the generated client (no
    # `--warnings-as-errors`; stylistic emitter cleanups are tracked
    # as follow-ups). Self-contained and runs in parallel with the
    # other jobs.
    name: Full Stripe OpenAPI generate / format / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
          rebar3-version: "3"

      - name: Cache Gleam build
        uses: actions/cache@v5
        with:
          path: |
            build/packages
            build/dev/erlang/oaspec
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-gleam-build-${{ hashFiles('manifest.toml', 'gleam.toml') }}-
            ${{ runner.os }}-gleam-build-

      - name: Download dependencies
        run: gleam deps download

      - name: Build oaspec (warnings as errors)
        run: gleam build --warnings-as-errors

      - name: Generate / format / build full Stripe OpenAPI
        run: bash integration_test/stripe_full.sh
