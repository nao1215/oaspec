name: Adapters

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: adapters-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adapter:
    name: ${{ matrix.adapter }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [httpc, fetch]
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
          rebar3-version: "3"

      - name: Cache Gleam build for adapter
        uses: actions/cache@v4
        with:
          path: |
            adapters/${{ matrix.adapter }}/build/packages
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-adapter-${{ matrix.adapter }}-${{ hashFiles(format('adapters/{0}/manifest.toml', matrix.adapter), format('adapters/{0}/gleam.toml', matrix.adapter)) }}
          restore-keys: |
            ${{ runner.os }}-gleam-adapter-${{ matrix.adapter }}-

      - name: Build adapter
        working-directory: adapters/${{ matrix.adapter }}
        run: |
          gleam deps download
          gleam build --warnings-as-errors
