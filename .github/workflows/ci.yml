name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
      - run: gleam format --check src/ test/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
      - name: Install rebar3
        run: |
          wget -q https://s3.amazonaws.com/rebar3/rebar3 -O /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3
      - run: gleam deps download
      - run: gleam build --warnings-as-errors

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
      - name: Install rebar3
        run: |
          wget -q https://s3.amazonaws.com/rebar3/rebar3 -O /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3
      - run: gleam deps download
      - run: gleam build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
      - name: Install rebar3
        run: |
          wget -q https://s3.amazonaws.com/rebar3/rebar3 -O /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3
      - run: gleam deps download
      - run: gleam test
