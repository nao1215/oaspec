name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  all:
    name: All checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"

      - name: Install rebar3
        run: |
          wget -q https://s3.amazonaws.com/rebar3/rebar3 -O /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Install ShellSpec
        run: |
          curl -fsSL https://git.io/shellspec | sh -s -- --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download dependencies
        run: gleam deps download

      - name: Format check
        run: gleam format --check src/ test/

      - name: Type check
        run: gleam check

      - name: Lint (glinter, strict)
        run: gleam run -m glinter -- --stats

      - name: Build (warnings as errors)
        run: gleam build --warnings-as-errors

      - name: Unit tests
        run: gleam test

      - name: ShellSpec tests
        run: shellspec

      - name: Integration tests
        run: bash integration_test/run.sh

      - name: Build escript
        run: gleam run -m gleescript

      - name: Smoke-test built escript
        run: bash scripts/smoke_escript.sh ./oaspec

      - name: Example — petstore client
        run: |
          gleam run -- generate --config=examples/petstore_client/oaspec.yaml
          cd examples/petstore_client && gleam deps download && gleam build --warnings-as-errors && gleam run

      - name: Example — server adapter
        run: |
          cd examples/server_adapter && gleam deps download && gleam build --warnings-as-errors && gleam run

      - name: README library examples compile check
        run: bash scripts/check_readme_examples.sh

      - name: Check version and count sync
        run: bash scripts/check_sync.sh
