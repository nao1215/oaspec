openapi: 3.0.3
info:
  title: Global Security API
  version: 1.0.0
security:
  - BearerAuth: []
paths:
  /me:
    get:
      operationId: getMe
      responses:
        '200':
          description: ok
  /public:
    get:
      operationId: getPublic
      security: []
      responses:
        '200':
          description: ok
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
