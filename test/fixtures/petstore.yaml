openapi: "3.0.3"
info:
  title: Petstore
  description: A sample API that uses a petstore as an example
  version: "1.0.0"
servers:
  - url: https://petstore.example.com/v1
    description: Production server
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns all pets from the system
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: How many items to return at one time (max 100)
          required: false
          schema:
            type: integer
            maximum: 100
        - name: offset
          in: query
          description: Offset for pagination
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "401":
          description: Unauthorized
    post:
      operationId: createPet
      summary: Create a pet
      description: Creates a new pet in the store
      tags:
        - pets
      requestBody:
        description: Pet to add to the store
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      description: Returns a single pet by its ID
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The ID of the pet to retrieve
          schema:
            type: integer
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
        "401":
          description: Unauthorized
    delete:
      operationId: deletePet
      summary: Delete a pet
      description: Deletes a pet by its ID
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The ID of the pet to delete
          schema:
            type: integer
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
        "401":
          description: Unauthorized
components:
  schemas:
    Pet:
      description: A pet in the store
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: integer
          description: Unique identifier for the pet
        name:
          type: string
          description: Name of the pet
          minLength: 1
          maxLength: 100
        tag:
          type: string
          description: Optional tag for the pet
        status:
          $ref: "#/components/schemas/PetStatus"
    CreatePetRequest:
      description: Request body for creating a new pet
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the pet
          minLength: 1
          maxLength: 100
        tag:
          type: string
          description: Optional tag for the pet
        status:
          $ref: "#/components/schemas/PetStatus"
    PetStatus:
      type: string
      description: The status of a pet in the store
      enum:
        - available
        - pending
        - sold
    Error:
      description: An error response
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
