openapi: "3.0.3"
info:
  title: Wildcard Content Type Test
  description: |
    Issue #504. Exercises `*/*` request and response media types as
    used by Kubernetes' OpenAPI v3 spec for proxy and resource-mutation
    endpoints. Both shapes should pass validation and generate working
    Gleam code.
  version: "1.0.0"
paths:
  /upload:
    post:
      operationId: uploadOpaqueBytes
      summary: Accept any payload as raw bytes
      requestBody:
        required: true
        content:
          "*/*":
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Echo
          content:
            "*/*":
              schema:
                type: string
                format: binary
  /proxy:
    get:
      operationId: proxyAnyResponse
      summary: Pass-through proxy returning any media type
      responses:
        "200":
          description: Whatever the upstream returned
          content:
            "*/*":
              schema:
                type: string
                format: binary
  /status:
    get:
      operationId: getServerStatus
      summary: Companion JSON endpoint
      description: |
        Forces the generator to emit a typed `types.Status` and the
        decode helper module — the wildcard endpoints alone wouldn't
        exercise them, and the integration build is run with
        `--warnings-as-errors`.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
components:
  schemas:
    Status:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        message:
          type: string
