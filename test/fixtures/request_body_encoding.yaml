openapi: "3.0.0"
info:
  title: Request Body Encoding Test
  version: "1.0.0"
paths:
  /pets:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                photo:
                  type: string
                  format: binary
            encoding:
              photo:
                contentType: image/png
      responses:
        "201":
          description: Created
