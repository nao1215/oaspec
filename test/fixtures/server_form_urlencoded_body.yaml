openapi: 3.0.3
info:
  title: Server Form Urlencoded Body Test API
  version: 1.0.0
paths:
  /submit:
    post:
      operationId: submitForm
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - name
                - scores
              properties:
                name:
                  type: string
                active:
                  type: boolean
                ratio:
                  type: number
                scores:
                  type: array
                  items:
                    type: integer
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: ok
