openapi: "3.0.3"
info:
  title: Multiple Issues
  version: "1.0.0"
# Issue 1: a global security requirement names a scheme that does not exist.
security:
  - nonexistent_scheme: []
paths:
  /users:
    get:
      # Issue 2: duplicate operationId across two operations.
      operationId: listItems
      responses:
        "200":
          description: OK
  /items:
    get:
      # Issue 2: operation-level security names a second nonexistent scheme,
      # so the validator must surface a distinct error from the global one
      # without short-circuiting after the first finding. (Was previously a
      # duplicate operationId; the parser now rejects that earlier per
      # #591, so this fixture uses two distinct security-ref issues to
      # exercise the same aggregation contract.)
      operationId: listOtherItems
      security:
        - missing_scheme_in_operation: []
      responses:
        "200":
          description: OK
