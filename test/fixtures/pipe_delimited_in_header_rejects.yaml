openapi: "3.0.3"
info:
  title: Pipe Delimited In Header Rejects
  version: "1.0.0"
paths:
  /items:
    get:
      operationId: listItems
      parameters:
        - name: X-Tags
          in: header
          description: Pipe-delimited is only valid for query parameters
          style: pipeDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: object
