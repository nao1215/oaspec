openapi: 3.0.3
info:
  title: Server Form Urlencoded Complex Fields Test API
  version: 1.0.0
paths:
  /submit:
    post:
      operationId: submitForm
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
      responses:
        "200":
          description: ok
